# yaml-language-server: $schema=../cache/schemas/tasks.json
$schema: "../cache/schemas/tasks.json"

inheritedBy:
  tag: bun_runtime

tasks:
  dev:
    command: bun
    args: ["src/index.ts"]
    deps:
      - typecheck
  start:
    command: bun
    args: ["--enable-source-maps", "dist/index.mjs"]
    deps:
      - build
      - "^:build"
    env:
      NODE_ENV: "production"
    options:
      runInCI: false
  start-prod:
    command: bun
    args: ["--enable-source-maps", "dist/index.mjs"]
    deps:
      - bundle
      - "^:build"
    env:
      NODE_ENV: "production"
    options:
      runInCI: false
  check:
    command: biome
    args: ["check", "--write"]
